apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: usg-radius
resources:
  - namespace.yaml
  - valkey.yaml
  - configmap.yaml
  - secret.example.yaml      # replace with secret.yaml in production
  - tls-secret.example.yaml  # replace with a real cert Secret (cert-manager recommended)
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  # MetalLB CRs live in metallb-system, not usg-radius — apply separately:
  #   kubectl apply -f k8s/metallb.yaml
  # (kustomize would force the wrong namespace on them).
