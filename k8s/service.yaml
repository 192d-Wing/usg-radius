# Dual-stack UDP LoadBalancer for RADIUS auth + accounting, fronted by MetalLB (BGP).
#
# MetalLB assigns one VIP per requested family from the pools defined in
# metallb.yaml (radius-v4, radius-v6). The annotations below pin this Service
# to those specific pools (autoAssign on the pools is false, so a pool name
# MUST be requested explicitly).
#
# externalTrafficPolicy: Local preserves the client source IP — required so
# the RADIUS server can match the source address to a client entry in
# config.json. With BGP mode this also causes MetalLB to only advertise the
# VIP from nodes that have a Ready endpoint, eliminating an extra hop.
#
# Cluster prereq: kube-proxy / CNI must have dual-stack enabled
# (--service-cluster-ip-range=<v4>,<v6>). Verify with `kubectl get nodes -o
# yaml | grep podCIDRs`.
apiVersion: v1
kind: Service
metadata:
  name: usg-radius
  namespace: usg-radius
  labels:
    app: usg-radius
  annotations:
    metallb.universe.tf/address-pool: radius-v4,radius-v6
    metallb.universe.tf/allow-shared-ip: usg-radius
spec:
  type: LoadBalancer
  ipFamilyPolicy: RequireDualStack
  ipFamilies: [IPv4, IPv6]
  externalTrafficPolicy: Local
  selector:
    app: usg-radius
  ports:
    - name: radius-auth
      port: 1812
      targetPort: radius-auth
      protocol: UDP
    - name: radius-acct
      port: 1813
      targetPort: radius-acct
      protocol: UDP
---
# Internal-only ClusterIP for /metrics + /healthz scraping.
apiVersion: v1
kind: Service
metadata:
  name: usg-radius-health
  namespace: usg-radius
  labels:
    app: usg-radius
spec:
  type: ClusterIP
  ipFamilyPolicy: PreferDualStack
  selector:
    app: usg-radius
  ports:
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
