# Single-instance / host-network overlay for testing.
#
# Use this INSTEAD of the BGP VIP setup when you want to bind the RADIUS server
# directly to a node's IP — useful for:
#   - single-node clusters (k3s, kind, minikube, microk8s)
#   - lab testing without MetalLB / LoadBalancer
#   - bare-metal smoke tests where you just want to point a NAS at the node IP
#
# Apply with:
#   kubectl apply -k k8s/overlays/hostnet/
#
# Then send RADIUS traffic to <node-ip>:1812 (UDP). Find the node IP with:
#   kubectl get nodes -o wide
#
# Trade-offs vs. the default BGP/LoadBalancer setup:
#   - Pins to ONE node (DaemonSet semantics) — no LB, no failover.
#   - Replicas == nodes selected by nodeSelector (default: 1 if you label one).
#   - Uses host's network namespace; ports 1812/1813/8080 must be free on the node.
#   - No source-NAT, so client source IPs are already preserved (no need for
#     externalTrafficPolicy gymnastics).
#   - Valkey is still required for multi-replica; for true single-instance
#     testing, scale Valkey to 1 or remove it from the base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: usg-radius

resources:
  - ../../namespace.yaml
  - ../../valkey.yaml
  - ../../configmap.yaml
  - ../../secret.example.yaml
  - ../../deployment.yaml
  # NOTE: service.yaml is intentionally omitted — hostNetwork pods are reached
  # directly via node IP, no Service needed.
  # NOTE: networkpolicy.yaml is omitted because hostNetwork pods bypass it.

patches:
  # Convert the Deployment into a single-node host-network pod.
  - target:
      kind: Deployment
      name: usg-radius
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/hostNetwork
        value: true
      - op: add
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirstWithHostNet
      # Pin to a single node — label it first with:
      #   kubectl label node <node-name> usg-radius/host=true
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          usg-radius/host: "true"
