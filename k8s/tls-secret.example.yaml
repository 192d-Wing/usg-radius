# EAP-TLS / EAP-TEAP certificate material.
#
# Generate in production with cert-manager, an internal CA, or a manual flow,
# then create the Secret. Example (test-only):
#
#   openssl req -new -x509 -days 365 -nodes -out ca.pem -keyout ca-key.pem \
#     -subj "/CN=Test CA"
#   openssl req -new -nodes -out server-req.pem -keyout server-key.pem \
#     -subj "/CN=radius.example.com"
#   openssl x509 -req -days 365 -in server-req.pem -CA ca.pem -CAkey ca-key.pem \
#     -CAcreateserial -out server.pem
#
#   kubectl create secret generic usg-radius-tls -n usg-radius \
#     --from-file=server.pem=server.pem \
#     --from-file=server-key.pem=server-key.pem \
#     --from-file=ca.pem=ca.pem
#
# For automated issuance, use cert-manager with an Issuer pointing at your
# internal CA (Vault PKI, ACME, ADCS, etc.):
#
#   apiVersion: cert-manager.io/v1
#   kind: Certificate
#   metadata: { name: usg-radius-tls, namespace: usg-radius }
#   spec:
#     secretName: usg-radius-tls
#     issuerRef: { name: internal-ca, kind: ClusterIssuer }
#     commonName: radius.example.com
#     dnsNames: [radius.example.com]
#     duration: 8760h    # 1 year
#     renewBefore: 720h  # rotate 30 days before expiry
#     privateKey: { algorithm: ECDSA, size: 256 }
#
# The Deployment expects keys named server.pem, server-key.pem, ca.pem.
apiVersion: v1
kind: Secret
metadata:
  name: usg-radius-tls
  namespace: usg-radius
type: Opaque
stringData:
  server.pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_ME
    -----END CERTIFICATE-----
  server-key.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
  ca.pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_ME
    -----END CERTIFICATE-----
