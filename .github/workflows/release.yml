name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build-linux:
    name: Build Linux Binary
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p radius-server --bin usg-radius --features observability

      - name: Strip binary
        run: strip target/release/usg-radius

      - name: Create archive
        run: |
          cd target/release
          tar czf usg-radius-${{ needs.create-release.outputs.version }}-x86_64-linux.tar.gz usg-radius
          sha256sum usg-radius-${{ needs.create-release.outputs.version }}-x86_64-linux.tar.gz > usg-radius-${{ needs.create-release.outputs.version }}-x86_64-linux.tar.gz.sha256

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./target/release/usg-radius-${{ needs.create-release.outputs.version }}-x86_64-linux.tar.gz
          asset_name: usg-radius-${{ needs.create-release.outputs.version }}-x86_64-linux.tar.gz
          asset_content_type: application/gzip

      - name: Upload SHA256
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./target/release/usg-radius-${{ needs.create-release.outputs.version }}-x86_64-linux.tar.gz.sha256
          asset_name: usg-radius-${{ needs.create-release.outputs.version }}-x86_64-linux.tar.gz.sha256
          asset_content_type: text/plain

  # Build each architecture in parallel on a NATIVE runner (no QEMU), push each
  # by digest, then assemble a single multi-arch manifest in `merge-image`.
  # arm64 uses a GitHub-hosted arm64 runner (free for public repos).
  # Build each component (server, ui) for each architecture in parallel on a
  # NATIVE runner (no QEMU), push each by digest, then assemble per-component
  # multi-arch manifests in `merge-image`.
  build-image:
    name: Build ${{ matrix.component.name }} (${{ matrix.arch.name }})
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: server, suffix: "-server", context: "." }
          - { name: ui, suffix: "-ui", context: "ui" }
        arch:
          - { name: amd64, platform: linux/amd64, runner: ubuntu-latest }
          - { name: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')${{ matrix.component.suffix }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to Iron Bank so the Dockerfiles' `FROM registry1.dso.mil/...`
      # base images can be pulled. REPO1 is the robot CLI secret (password),
      # REPO1_USER is the robot username.
      - name: Log in to Iron Bank (registry1.dso.mil)
        uses: docker/login-action@v3
        with:
          registry: registry1.dso.mil
          username: ${{ secrets.REPO1_USER }}
          password: ${{ secrets.REPO1 }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          platforms: ${{ matrix.arch.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.component.name }}-${{ matrix.arch.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}-${{ matrix.arch.name }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.component.name }}-${{ matrix.arch.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-image:
    name: Merge & push ${{ matrix.component.name }} manifest
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: server, suffix: "-server" }
          - { name: ui, suffix: "-ui" }
    steps:
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')${{ matrix.component.suffix }}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.component.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
