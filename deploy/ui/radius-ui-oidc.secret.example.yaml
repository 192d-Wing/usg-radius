# Template for the operator-provided OIDC secret that oauth2-proxy.yaml expects.
# Copy to radius-ui-oidc.secret.yaml, fill in real values, and apply — do NOT
# commit the filled-in copy.
#
#   cp deploy/ui/radius-ui-oidc.secret.example.yaml deploy/ui/radius-ui-oidc.secret.yaml
#   # edit values, then:
#   kubectl apply -f deploy/ui/radius-ui-oidc.secret.yaml
#
# cookie-secret must be exactly 16, 24, or 32 bytes:
#   openssl rand -base64 32 | head -c 32
#
# Also required by oauth2-proxy.yaml / ingress.yaml (operator-provided):
#   - Keycloak client `radius-ui` (public + PKCE), redirect URI
#       https://radius-ui.oopl.dev.mil/oauth2/callback
#   - Secret `oopl-ca`     (key ca.pem)  — internal CA that signed Keycloak
#   - Secret `radius-ui-tls` (tls.crt/tls.key) — cert for radius-ui.oopl.dev.mil
#   - DNS: radius-ui.oopl.dev.mil -> 10.10.10.54 (Traefik LB)
---
apiVersion: v1
kind: Secret
metadata:
  name: radius-ui-oidc
  namespace: radius
type: Opaque
stringData:
  oidc-issuer-url: "https://icam.oopl.dev.mil/realms/REPLACE_REALM"
  client-id: "radius-ui"
  cookie-secret: "REPLACE_WITH_32_BYTE_RANDOM"
