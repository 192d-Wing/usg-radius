apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# usg-radius-ui (Cloudscape SPA + axum BFF). Deploy into the existing `radius`
# namespace alongside the server. Front with oauth2-proxy + ingress for real use.
namespace: radius

resources:
  - deployment.yaml
  - service.yaml

images:
  - name: ghcr.io/192d-wing/usg-radius-ui
    newTag: "0.9.1"
