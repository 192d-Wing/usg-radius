---
# Cluster-internal service for health checks and Prometheus metrics. These are NOT
# exposed on the anycast VIP — only the RADIUS auth/acct UDP ports are.
apiVersion: v1
kind: Service
metadata:
  name: usg-radius-internal
  namespace: radius
  labels:
    app.kubernetes.io/name: usg-radius-server
    app.kubernetes.io/part-of: usg-radius
spec:
  type: ClusterIP
  ipFamilyPolicy: PreferDualStack
  selector:
    app.kubernetes.io/name: usg-radius-server
  ports:
    - name: health
      port: 2812
      targetPort: health
      protocol: TCP
    - name: metrics
      port: 3812
      targetPort: metrics
      protocol: TCP
    - name: mgmt
      port: 4812
      targetPort: mgmt
      protocol: TCP
