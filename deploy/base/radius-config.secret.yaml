---
# Full server configuration, delivered as a Secret because it contains the shared
# RADIUS secret and (for bootstrap) local user passwords.
#
# NOTE: the binary only env-expands `${VAR}` inside the top-level `secret` and each
# `clients[].secret` field — NOT passwords/addresses/usernames. Keeping the whole
# config in a Secret avoids that limitation: every value here is literal.
#
# PRODUCTION: replace the placeholder secret/password below (e.g. with a SealedSecret
# or external secrets operator), and prefer LDAP/PostgreSQL auth over local `users`.
apiVersion: v1
kind: Secret
metadata:
  name: radius-config
  namespace: radius
  labels:
    app.kubernetes.io/name: usg-radius-server
    app.kubernetes.io/part-of: usg-radius
type: Opaque
stringData:
  config.json: |
    {
      "listen_address": "::",
      "listen_port": 1812,
      "secret": "CHANGE_ME_shared_radius_secret",
      "clients": [
        {
          "address": "10.0.0.0/8",
          "secret": "CHANGE_ME_shared_radius_secret",
          "name": "Default NAS network (replace with your real client networks)",
          "enabled": true
        }
      ],
      "users": [
        {
          "username": "admin",
          "password": "CHANGE_ME_admin_password",
          "attributes": {}
        }
      ],
      "log_level": "info",
      "audit_log_path": "/var/log/radius/audit.log",
      "accounting_log_path": "/var/log/radius/accounting.jsonl",
      "strict_rfc_compliance": true,
      "request_cache_ttl": 60,
      "request_cache_max_entries": 10000,
      "rate_limit_per_client_rps": 100,
      "rate_limit_per_client_burst": 200,
      "rate_limit_global_rps": 1000,
      "rate_limit_global_burst": 2000
    }
